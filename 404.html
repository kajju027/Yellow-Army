<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unavailable</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: #000000; /* Real Black */
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat', sans-serif;
    }.offline-text {
    font-size: clamp(32px, 6vw, 80px);
    font-weight: 600;
    letter-spacing: 3px;
    color: #bfbfbf; /* Soft Gray */
    text-transform: uppercase;
    text-align: center;
    position: relative;
    /* Ultra-clean subtle shine */
    text-shadow: 0 0 4px rgba(191,191,191,0.12);
}

.tg-watermark{
    position: fixed;
    bottom: 14px;
    right: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: #9e9e9e;
    text-decoration: none;
    opacity: 0.55;
    transition: opacity 0.3s ease;
    user-select: none;
}

.tg-watermark:hover{
    opacity: 0.85;
}

.tg-watermark svg{
    width: 14px;
    height: 14px;
    fill: #9e9e9e;
}

</style>
</head>
<body><div class="offline-text">STREAM OFFLINE !!</div>

<!-- Telegram Watermark -->

    <svg viewBox="0 0 24 24" aria-hidden="true">

    </svg>
    <span>TG // Sayan Official</span>

</body>
</html>
