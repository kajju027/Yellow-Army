<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0a0c10">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.0.7/dist/controls.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/latest/shaka-player.compiled.js"></script>
	
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --bg-color: #0a0c10;
    --primary-blue: #3b82f6;
    --primary-blue-dark: #1d4ed8;
    --card-bg: #111318;
    --surface2: #181c23;
    --text-light: #f0f4ff;
    --text-muted: #6b7280;
    --border-color: rgba(255,255,255,0.07);
    --accent-gold: #60a5fa;
    --glow: rgba(59,130,246,0.35);
    --red: #ef4444;
    --base-font-size: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
    font-size: var(--base-font-size);
    color-scheme: dark;
}

body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    background-color: var(--bg-color);
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1rem;
    padding-bottom: 0;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
}
body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 45% at 50% 0%, rgba(59,130,246,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
}

/* ─── LOADING ─── */
#loadingScreen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg-color);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    gap: 0;
}

.loader-ring {
    width: 44px;
    height: 44px;
    position: relative;
}
.loader-ring::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 2.5px solid rgba(59,130,246,0.08);
    border-radius: 50%;
}
.loader-ring::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2.5px solid transparent;
    border-top-color: var(--primary-blue);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
}

.loader-glow {
    position: absolute;
    width: 70px;
    height: 70px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
    border-radius: 50%;
    animation: loaderGlowPulse 2s ease-in-out infinite;
    pointer-events: none;
}
@keyframes loaderGlowPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
}

.loader-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.2rem;
}

#loadingScreen p {
    color: var(--text-muted);
    font-size: 0.7rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* ─── POPUP ─── */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(10px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.25rem;
  z-index: 9999;
}
.popup-overlay.show { display: flex; }

.popup-box {
  width: 100%;
  max-width: 25rem;
  background: linear-gradient(145deg, var(--surface2), #0d0f14);
  border-radius: 1.1rem;
  padding: 2.25rem 1.5rem;
  border: 1px solid rgba(59,130,246,0.2);
  box-shadow: 0 0.75rem 2rem rgba(59,130,246,0.1), 0 24px 60px rgba(0,0,0,0.5);
  text-align: center;
  animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.popup-title {
  color: var(--accent-gold);
  font-family: 'DM Sans', sans-serif;
  font-size: 1.7rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-bottom: 0.85rem;
}

.popup-text {
  color: #9ca3af;
  font-size: 0.92rem;
  font-weight: 400;
  line-height: 1.65;
  margin-bottom: 1.75rem;
}
.popup-text b {
  color: #ffffff;
  font-size: 1rem;
  font-weight: 500;
  display: block;
  margin-top: 0.4rem;
}

.btn {
  width: 100%;
  padding: 0.9rem 0.875rem;
  border: none;
  border-radius: 0.65rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-join {
  background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-dark));
  color: #fff;
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 0.3px;
  box-shadow: 0 0.3rem 1rem rgba(59,130,246,0.25);
  margin-bottom: 0.6rem;
}
.btn-join:hover {
  transform: translateY(-2px);
  box-shadow: 0 0.4rem 1.2rem rgba(59,130,246,0.4);
}
.btn-joined {
  background: transparent;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 400;
  text-decoration: none;
  margin-top: 0.25rem;
  border: 1px solid var(--border-color);
}
.btn-joined:hover { color: var(--text-light); background: var(--card-bg); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(1.5rem) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ─── CONTAINER ─── */
.container {
    width: 100%;
    max-width: 50rem;
    opacity: 0;
    transform: translateY(1rem);
    animation: fadeIn 0.5s ease-out forwards;
    z-index: 1;
    position: relative;
}

/* ─── STREAM HEADER ─── */
.stream-header {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    padding: 0.9rem 1.1rem;
    border-radius: 0.65rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.7rem;
    backdrop-filter: blur(8px);
}
.stream-header h1 {
    font-size: 1.15rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
}

.live-badge {
    background-color: var(--red);
    color: white;
    padding: 0.25rem 0.7rem;
    border-radius: 1rem;
    font-size: 0.7rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    animation: pulse 1.5s infinite;
    font-family: 'DM Sans', sans-serif;
}
@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
    70% { transform: scale(1); box-shadow: 0 0 0 0.45rem rgba(239, 68, 68, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

/* ─── PLAYER ─── */
#player-container {
    width: 100%;
    height: 50vh;
    max-height: 35rem;
    background-color: #000;
    box-shadow: 0 0 0 1px var(--border-color), 0 0 35px rgba(59,130,246,0.06), 0 0.5rem 1.2rem rgba(0,0,0,0.4);
    border-radius: 0.65rem;
    overflow: hidden;
    position: relative;
}

.rotate-fallback-notice {
    position: absolute; left: 0.5rem; bottom: 0.5rem; z-index: 22000;
    background: rgba(0,0,0,0.55); color: var(--text-light);
    padding: .3rem .5rem; border-radius: 0.3rem; font-size: .7rem; display: none;
}
.player-rotated {
    transform-origin: center center; width: 100vh; height: 100vw;
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(90deg);
    z-index: 21000; border-radius: 0;
}

.view-counter {
    position: absolute; top: 0.5rem; right: 0.6rem;
    background: transparent;
    border: none;
    padding: 0.4rem 0.8rem;
    z-index: 9999; text-align: right;
    pointer-events: none;
}
.view-counter .name {
    font-size: 0.65rem; font-weight: 500; color: #fff;
    opacity: 0.85; margin-bottom: 2px;
    letter-spacing: 0.2px; text-transform: capitalize;
}
.view-counter .views {
    font-size: 0.75rem; font-weight: 500; color: #fff;
    letter-spacing: 0.2px; transition: color 0.3s ease;
}

/* ─── INFO CARDS ─── */
.info-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 0.85rem;
    padding: 1.1rem;
    margin-top: 0.7rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0.2rem 0.8rem rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(8px);
}
.info-card h2 {
    font-size: 0.9rem; font-weight: 500;
    margin-bottom: 0.7rem;
    display: flex; align-items: center; justify-content: center;
    gap: 0.5rem; color: var(--text-light);
}
.info-card h2 svg { width: 1.1rem; height: 1.1rem; flex-shrink: 0; }

.action-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin-bottom: 0.7rem;
    color: var(--text-light);
}

.action-button {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    width: 100%;
    padding: 0.8rem 0.9rem;
    border-radius: 0.65rem;
    background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-dark));
    color: white;
    font-weight: 500; font-size: 0.9rem;
    text-decoration: none; border: none; cursor: pointer;
    transition: all 0.3s ease;
    position: relative; overflow: hidden;
    box-shadow: 0 0.2rem 0.8rem rgba(59,130,246,0.18);
    font-family: 'DM Sans', sans-serif;
}
.action-button::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.5s ease;
}
.action-button:hover::before { left: 100%; }
.action-button svg { width: 1rem; height: 1rem; flex-shrink: 0; }
.action-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0.4rem 1rem rgba(59,130,246,0.3);
}
.action-button.copied { background: linear-gradient(135deg, #22c55e, #16a34a) !important; }

/* ─── ERROR PAGE ─── */
.error-container {
    width: 100%;
    max-width: 30rem;
    text-align: center;
    background: linear-gradient(145deg, var(--surface2), #0d0f14);
    border: 1px solid var(--border-color);
    border-radius: 1.1rem;
    padding: 2.5rem 1.75rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1.25rem 3rem rgba(0, 0, 0, 0.45), 0 0 40px rgba(59,130,246,0.05);
    animation: errorFadeIn 0.5s ease-out forwards;
}
.error-container::before {
    content: '';
    position: absolute;
    top: -4rem; left: 50%;
    transform: translateX(-50%);
    width: 9rem; height: 9rem;
    background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%);
    pointer-events: none;
}

.error-icon-wrapper {
    width: 62px;
    height: 62px;
    background: rgba(59,130,246,0.06);
    border: 1px solid rgba(59,130,246,0.12);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    animation: errorGlow 3s ease-in-out infinite;
}
@keyframes errorGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.12); }
    50% { box-shadow: 0 0 18px rgba(59,130,246,0.08); }
}
.error-icon-wrapper svg {
    width: 28px;
    height: 28px;
    fill: var(--primary-blue);
}

.error-title {
    font-size: 1.35rem;
    font-weight: 500;
    text-transform: uppercase;
    color: var(--text-light);
    letter-spacing: 2.5px;
    margin-bottom: 0.75rem;
    font-family: 'DM Sans', sans-serif;
}

.error-desc {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 400;
    line-height: 1.7;
    margin-bottom: 2rem;
    max-width: 20rem;
    margin-left: auto;
    margin-right: auto;
}

.error-buttons {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
}

.error-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem;
    padding: 0.7rem 1.1rem;
    border-radius: 2.5rem;
    font-weight: 500; font-size: 0.8rem;
    text-decoration: none; cursor: pointer;
    transition: all 0.25s ease; border: none;
    text-transform: uppercase; letter-spacing: 0.4px;
    font-family: 'DM Sans', sans-serif;
}
.error-btn svg { width: 0.95rem; height: 0.95rem; }

.error-btn.support {
    background: var(--text-light);
    color: #000;
}
.error-btn.support:hover {
    transform: translateY(-2px);
    box-shadow: 0 0.4rem 1rem rgba(255, 255, 255, 0.12);
}

.error-btn.live {
    background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-dark));
    color: #fff;
}
.error-btn.live:hover {
    transform: translateY(-2px);
    box-shadow: 0 0.4rem 1rem rgba(59,130,246,0.35);
}

@keyframes errorFadeIn {
    from { opacity: 0; transform: translateY(1rem); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
    .error-container { padding: 2rem 1.25rem; }
    .error-title { font-size: 1.1rem; letter-spacing: 2px; }
    .error-buttons { flex-direction: column; }
    .error-btn { width: 100%; }
    .popup-box { padding: 1.5rem 1rem; max-width: 90%; }
    .popup-title { font-size: 1.35rem; }
}

/* ─── FOOTER ─── */
.site-footer {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 0.6rem 1rem 1.1rem;
}

.visitor-counter {
    margin-bottom: 0.3rem;
    opacity: 0.45;
    transition: opacity 0.3s;
}
.visitor-counter:hover { opacity: 0.7; }

.copyright {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.16);
    letter-spacing: 0.3px;
    font-family: 'DM Sans', sans-serif;
}
</style>
</head>
<body>

<div id="loadingScreen">
    <div class="loader-wrapper">
        <div class="loader-glow"></div>
        <div class="loader-ring"></div>
    </div>
    <p>Loading</p>
</div>

<div class="popup-overlay" id="popup">
  <div class="popup-box">
    <div class="popup-title">Support Us !!</div>
    <div class="popup-text">
      Join our WhatsApp Group <br>
      <b>YELLOW ARMY 💛</b>
      For Instant Updates & Exclusive Links.
    </div>
    <button class="btn btn-join" onclick="joinNow()">JOIN NOW</button>
    <button class="btn btn-joined" onclick="closePopup()">Already Joined</button>
  </div>
</div>

<main class="container">
    <div id="stream-content"></div>
</main>

<footer class="site-footer">
    <div id="poweredBySection"></div>
    <div class="visitor-counter">
        <!-- BEGIN: Powered by Supercounters.com -->

        <!-- END: Powered by Supercounters.com -->
    </div>
    <div class="copyright">© 2026 DILLZY · All Rights Reserved</div>
</footer>

<script src="script.js"></script>
</body>
</html>
